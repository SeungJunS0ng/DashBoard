name: Deploy backend on develop

on:
  push:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: deploy-backend-develop
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: "21"

      - name: Test and build boot jar
        run: |
          chmod +x ./gradlew
          ./gradlew clean test bootJar

      - name: Prepare SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > ~/.ssh/dashboard-key.pem
          chmod 600 ~/.ssh/dashboard-key.pem
          ssh-keygen -y -f ~/.ssh/dashboard-key.pem > /dev/null
          ssh-keyscan -T 30 -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts || true

      - name: Upload jar to EC2
        run: |
          JAR_PATH="$(ls build/libs/*.jar | head -n 1)"
          scp -o StrictHostKeyChecking=no -i ~/.ssh/dashboard-key.pem "$JAR_PATH" \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.EC2_APP_PATH }}"

      - name: Restart backend service
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/dashboard-key.pem "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "sudo systemctl restart ${{ secrets.EC2_SERVICE_NAME }} && \
             for i in {1..36}; do \
               if curl -fsS http://127.0.0.1:8080/api/public/health >/dev/null; then \
                 sudo systemctl is-active ${{ secrets.EC2_SERVICE_NAME }}; \
                 exit 0; \
               fi; \
               sleep 5; \
             done; \
             sudo systemctl status ${{ secrets.EC2_SERVICE_NAME }} --no-pager; \
             sudo journalctl -u ${{ secrets.EC2_SERVICE_NAME }} -n 120 --no-pager; \
             exit 1"
