spring:
  application:
    name: DashBoard

  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5432/dashboard}
    username: ${DB_USERNAME:dashboard}
    password: ${DB_PASSWORD:dashboard}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
          batch_size: 20
          fetch_size: 50
    show-sql: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT:2000ms}

  cache:
    type: redis
    redis:
      time-to-live: 600000ms
      cache-null-values: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:dashboard-backend}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      missing-topics-fatal: false

app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://43.201.141.9:*,https://*.vercel.app,https://*.netlify.app}
  rabbit:
    enabled: ${RABBIT_ENABLED:true}
  kafka:
    enabled: ${KAFKA_ENABLED:false}
    sensor-topic: ${KAFKA_SENSOR_TOPIC:uemd.sensor.data}
  mqtt:
    enabled: ${MQTT_ENABLED:false}
    broker-url: ${MQTT_BROKER_URL:tcp://localhost:1883}
    client-id: ${MQTT_CLIENT_ID:dashboard-backend}
    username: ${MQTT_USERNAME:}
    password: ${MQTT_PASSWORD:}
    qos: ${MQTT_QOS:1}
    topics: ${MQTT_TOPICS:factory/equipment/+/metadata,factory/equipment/+/telemetry}

jwt:
  secret: ${JWT_SECRET:your-secret-key-that-is-at-least-256-bits-long-for-hs512-algorithm-must-be-very-long-and-secure-key}
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /api-docs

server:
  port: 8080
