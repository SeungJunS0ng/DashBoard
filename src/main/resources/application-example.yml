# 📋 application.yml 샘플 파일
# 기본 application.yml에는 공통 설정만 두고,
# 로컬 개발용 값은 application-local.yml 또는 환경변수로 분리하는 것을 권장합니다.

spring:
  application:
    name: DashBoard

  datasource:
    # PostgreSQL / TimescaleDB 데이터베이스 연결 설정
    url: jdbc:postgresql://[HOST]:[PORT]/[DATABASE]
    username: [DB_USERNAME]
    password: [DB_PASSWORD]          # 강력한 비밀번호 사용
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate            # Flyway 적용 후에는 validate 권장
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
          # TimescaleDB에서도 그대로 사용 가능한 기본 배치 설정
          batch_size: 20
          fetch_size: 50
    show-sql: false                  # 프로덕션에서는 false로 설정

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  # ⚠️ 보안 주의: 최소 256자 이상의 강력한 시크릿 키 사용
  secret: [JWT_SECRET_KEY]           # 환경변수로 주입 권장
  access-token-expiration: 3600000   # 1시간 (밀리초)
  refresh-token-expiration: 604800000 # 7일 (밀리초)

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /api-docs

server:
  port: 8080

---
# 로컬 개발 프로필 예시
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/dashboard
    username: postgres
    password: [LOCAL_POSTGRES_PASSWORD]

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis

# 실행 예시
# - IntelliJ: Active profiles = local
# - CLI: set SPRING_PROFILES_ACTIVE=local
#
# 운영/공용 DB는 Flyway 마이그레이션으로 스키마를 관리하고,
# JPA는 validate로 엔티티-스키마 불일치만 검증하는 방식을 권장합니다.

---
# 프로덕션 프로필 설정 예시
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    hibernate:
      ddl-auto: validate            # 프로덕션에서는 스키마 자동 생성 금지

---
# 테스트 프로필 설정 예시
spring:
  config:
    activate:
      on-profile: test
  jpa:
    hibernate:
      ddl-auto: create-drop         # 테스트 실행 후 자동 삭제

